version: '3.8'

services:
  app:
    image: jagx-monie:latest
    container_name: jagx-monie
    environment:
      - DATABASE_URL=postgres://user:password@db:5432/database_name
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=development
    ports:
      - '3000:3000'
    depends_on:
      - db
      - redis

  db:
    image: postgres:14
    container_name: jagx-monie-postgres
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=database_name
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    container_name: jagx-monie-redis
    ports:
      - '6379:6379'

volumes:
  db_data:
    driver: local